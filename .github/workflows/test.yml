name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Los tests solo cubren lógica pura y datos, así que no hace falta compilar
      # binarios nativos (sharp) ni ejecutar los scripts de generación de imágenes.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests
        run: pnpm test
